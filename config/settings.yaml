scraper_config:
  default_rate_limit: 2
  timeout: 10
  retries: 3
  user_agent: "ByteBrief/1.0 (+https://github.com/WAATS0N/ByteBrief)"
  max_articles_per_source: 10
  output_format: "json"  # json, csv, database
  
categories:
  - "technology"
  - "business"
  - "politics"
  - "world"
  - "sports"
  - "health"
  - "science"
