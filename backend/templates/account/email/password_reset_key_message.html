<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-w-md;
            margin: 0 auto;
            padding: 20px;
            background-color: #111;
            border-radius: 12px;
            border: 1px solid #333;
        }

        h2 {
            color: #fff;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(to right, #9333ea, #06b6d4);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin: 20px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Password Reset Request</h2>
        <p>Hello,</p>
        <p>We received a request to reset the password for your ByteBrief account.</p>
        <p><a href="{{ password_reset_url }}" class="btn">Reset Password</a></p>
        <p>If you did not request a password reset, you can safely ignore this email. This link will expire soon.</p>
        <div class="footer">
            Regards,<br>
            The ByteBrief Team
        </div>
    </div>
</body>

</html>
