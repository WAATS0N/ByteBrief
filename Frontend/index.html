<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByteBrief – Landing Preview</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      background:#0b0616;
    }

    .landing{
      min-height:100vh;
      overflow:hidden;
      background: radial-gradient(circle at 25% 10%, #6b2cff, #0b0616 70%);
    }

    .topbar{
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 16px 24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      letter-spacing:.2px;
    }
    .logo{
      width:36px;height:36px;border-radius:10px;
      background: linear-gradient(135deg,#7c3aed,#22d3ee);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .auth{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .btn{
      border-radius:12px;
      padding:10px 14px;
      border:1px solid rgba(255,255,255,.22);
      color:#fff;
      background:transparent;
      cursor:pointer;
      font-weight:650;
    }
    .btnSolid{
      border:0;
      background: linear-gradient(90deg, #7c3aed, #22d3ee);
      box-shadow:0 14px 40px rgba(0,0,0,.35);
    }

    .hero{
      height: calc(100vh - 72px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:14px;
      padding: 0 18px;
    }

    h1{
      margin:0;
      font-size: clamp(44px, 6vw, 80px);
      letter-spacing:.5px;
      background: linear-gradient(90deg,#b453ff,#22d3ee);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .subtitle{
      margin:0;
      opacity:.9;
      font-size: clamp(16px, 2vw, 22px);
    }

    .stage{
      position:relative;
      width:min(860px, 92vw);
      height: 340px;
      margin-top: 10px;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,.35));
    }

    .paper{
      position:absolute;
      left:50%;
      bottom:-60px;
      width: 240px;
      height: 150px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.16);
      background:
        /* “newspaper lines” */
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.14) 0px,
          rgba(255,255,255,.14) 2px,
          rgba(255,255,255,0) 2px,
          rgba(255,255,255,0) 10px
        ),
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      backdrop-filter: blur(10px);
      transform-style: preserve-3d;
      opacity:0;
      animation: riseSpin 3.8s linear infinite;
    }

    /* different X positions + delays */
    .p1{ --x:-320px; animation-delay: 0s; }
    .p2{ --x:-160px; animation-delay: .55s; }
    .p3{ --x: 0px;   animation-delay: 1.1s; }
    .p4{ --x: 160px; animation-delay: 1.65s; }
    .p5{ --x: 320px; animation-delay: 2.2s; }

    @keyframes riseSpin{
      0%{
        opacity:0;
        transform: translateX(var(--x)) translateY(170px) rotate(0deg) scale(.96);
      }
      12%{ opacity:1; }
      65%{ opacity:1; }
      100%{
        opacity:0;
        transform: translateX(var(--x)) translateY(-290px) rotate(360deg) scale(1.03);
      }
    }

    .ctaRow{
      display:flex;
      gap:12px;
      margin-top: 6px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .note{
      margin-top: 8px;
      opacity:.75;
      font-size: 13px;
      max-width: 720px;
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>ByteBrief</div>
      </div>

      <div class="auth">
        <button class="btn" onclick="alert('Go to Login page')">Login</button>
        <button class="btn btnSolid" onclick="alert('Go to Signup page')">Sign Up</button>
      </div>
    </div>

    <div class="hero">
      <h1>ByteBrief</h1>
      <p class="subtitle">Smart News Digest Generator</p>

      <div class="stage" aria-hidden="true">
        <div class="paper p1"></div>
        <div class="paper p2"></div>
        <div class="paper p3"></div>
        <div class="paper p4"></div>
        <div class="paper p5"></div>
      </div>

      <div class="ctaRow">
        <button class="btn btnSolid" onclick="alert('Navigate to /home')">Explore</button>
        <button class="btn" onclick="alert('Scroll / Learn more')">Learn More</button>
      </div>

      <div class="note">
        Tip: In your real project, replace the alert() with routing (e.g., React Router navigate('/home')).
      </div>
    </div>
  </div>
</body>
</html>
